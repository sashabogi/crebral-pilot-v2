name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release with Tauri
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Crebral Pilot ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install Crebral Pilot ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

      - name: Collect and upload updater artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          ARTIFACT_PATHS='${{ steps.tauri_build.outputs.artifactPaths }}'
          echo "Artifact paths from tauri-action: $ARTIFACT_PATHS"

          # Determine bundle directory
          if [ "${{ runner.os }}" == "Windows" ]; then
            BUNDLE_DIR="src-tauri/target/release/bundle"
          else
            TARGET="${{ matrix.rust_target }}"
            if [ -n "$TARGET" ]; then
              BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
            else
              BUNDLE_DIR="src-tauri/target/release/bundle"
            fi
          fi

          # Collect staging dir for .sig files
          mkdir -p /tmp/updater-sigs

          # Strategy 1: Look for .sig adjacent to known artifacts
          if [ -n "$ARTIFACT_PATHS" ] && [ "$ARTIFACT_PATHS" != "null" ]; then
            echo "--- Strategy 1: artifact paths ---"
            for artifact in $(echo "$ARTIFACT_PATHS" | jq -r '.[]' 2>/dev/null); do
              sig="${artifact}.sig"
              if [ -f "$sig" ]; then
                echo "Found sig (adjacent): $sig"
                cp "$sig" /tmp/updater-sigs/
              fi
            done
          fi

          # Strategy 2: Find .sig files in bundle directory
          echo "--- Strategy 2: find in $BUNDLE_DIR ---"
          if [ -d "$BUNDLE_DIR" ]; then
            find "$BUNDLE_DIR" -name "*.sig" -type f 2>/dev/null | while IFS= read -r f; do
              echo "Found sig (find): $f"
              cp "$f" /tmp/updater-sigs/
            done
          else
            echo "Bundle dir does not exist: $BUNDLE_DIR"
          fi

          # Strategy 3: Broader search in entire target
          echo "--- Strategy 3: broad search ---"
          find src-tauri/target -name "*.app.tar.gz.sig" -o -name "*.nsis.zip.sig" -o -name "*.msi.zip.sig" 2>/dev/null | while IFS= read -r f; do
            echo "Found sig (broad): $f"
            cp "$f" /tmp/updater-sigs/
          done

          # Also find updater zip bundles for Windows
          find src-tauri/target -name "*.nsis.zip" -not -name "*.sig" -o -name "*.msi.zip" -not -name "*.sig" 2>/dev/null | while IFS= read -r f; do
            echo "Found zip bundle: $f"
            cp "$f" /tmp/updater-sigs/
          done

          echo "--- Collected files ---"
          ls -la /tmp/updater-sigs/ || echo "(empty)"

          # Upload all collected files to the GitHub release
          for f in /tmp/updater-sigs/*; do
            [ -f "$f" ] || continue
            echo "Uploading to release: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber || echo "Failed: $(basename "$f")"
          done

      - name: Save .sig files as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-sigs-${{ matrix.rust_target || 'windows' }}
          path: /tmp/updater-sigs/*.sig
          if-no-files-found: warn

  publish-updater:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all sig artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-sigs
          pattern: updater-sigs-*
          merge-multiple: true

      - name: Debug downloaded artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          find /tmp/all-sigs -type f 2>/dev/null || echo "No artifacts downloaded"

      - name: Upload sigs to release (fallback)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for f in /tmp/all-sigs/*.sig 2>/dev/null; do
            [ -f "$f" ] || continue
            echo "Uploading sig: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber || true
          done

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAG="${{ github.ref_name }}"
          export VERSION="${TAG#v}"
          export REPO="${{ github.repository }}"
          export PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          echo "Generating latest.json for version $VERSION..."

          # List all release assets
          ASSET_LIST=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Release assets:"
          echo "$ASSET_LIST"
          export ASSET_LIST

          mkdir -p /tmp/sigs

          python3 <<'PYEOF'
          import json, subprocess, os, sys

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          repo = os.environ["REPO"]
          pub_date = os.environ["PUB_DATE"]
          base_url = os.environ["BASE_URL"]

          assets = [a.strip() for a in os.environ.get("ASSET_LIST", "").strip().split("\n") if a.strip()]
          print(f"Found {len(assets)} release assets")

          def find_asset(suffix):
              for a in assets:
                  if a.endswith(suffix):
                      return a
              return None

          def read_sig(sig_name):
              if not sig_name or sig_name not in assets:
                  for root, dirs, files in os.walk("/tmp/all-sigs"):
                      for f in files:
                          if f == sig_name:
                              path = os.path.join(root, f)
                              return open(path).read().strip()
                  return None
              subprocess.run(
                  ["gh", "release", "download", tag, "--repo", repo,
                   "--pattern", sig_name, "--dir", "/tmp/sigs", "--clobber"],
                  capture_output=True
              )
              path = f"/tmp/sigs/{sig_name}"
              if os.path.isfile(path):
                  return open(path).read().strip()
              return None

          platforms = {}

          # macOS aarch64
          mac_arm_bundle = find_asset("_aarch64.app.tar.gz")
          mac_arm_sig_name = find_asset("_aarch64.app.tar.gz.sig")
          mac_arm_sig = read_sig(mac_arm_sig_name)
          if mac_arm_bundle and mac_arm_sig:
              platforms["darwin-aarch64"] = {
                  "signature": mac_arm_sig,
                  "url": f"{base_url}/{mac_arm_bundle}"
              }
              print("Added darwin-aarch64")
          else:
              print(f"SKIP darwin-aarch64: bundle={mac_arm_bundle}, sig_name={mac_arm_sig_name}, sig={'found' if mac_arm_sig else 'MISSING'}")

          # macOS x64
          mac_x64_bundle = find_asset("_x64.app.tar.gz")
          mac_x64_sig_name = find_asset("_x64.app.tar.gz.sig")
          mac_x64_sig = read_sig(mac_x64_sig_name)
          if mac_x64_bundle and mac_x64_sig:
              platforms["darwin-x86_64"] = {
                  "signature": mac_x64_sig,
                  "url": f"{base_url}/{mac_x64_bundle}"
              }
              print("Added darwin-x86_64")
          else:
              print(f"SKIP darwin-x86_64: bundle={mac_x64_bundle}, sig_name={mac_x64_sig_name}, sig={'found' if mac_x64_sig else 'MISSING'}")

          # Windows x64 — prefer NSIS, fallback to MSI
          for suffix_zip, suffix_sig in [("nsis.zip", "nsis.zip.sig"), ("msi.zip", "msi.zip.sig")]:
              if "windows-x86_64" in platforms:
                  break
              win_bundle = find_asset(suffix_zip)
              win_sig_name = find_asset(suffix_sig)
              win_sig = read_sig(win_sig_name)
              if win_bundle and win_sig:
                  platforms["windows-x86_64"] = {
                      "signature": win_sig,
                      "url": f"{base_url}/{win_bundle}"
                  }
                  fmt = suffix_zip.split(".")[0]
                  print(f"Added windows-x86_64 ({fmt})")
              else:
                  print(f"SKIP windows-x86_64 ({suffix_zip}): bundle={win_bundle}, sig_name={win_sig_name}, sig={'found' if win_sig else 'MISSING'}")

          latest = {
              "version": version,
              "notes": f"Crebral Pilot v{version}",
              "pub_date": pub_date,
              "platforms": platforms
          }

          with open("/tmp/latest.json", "w") as f:
              json.dump(latest, f, indent=2)

          print("\n=== latest.json ===")
          print(json.dumps(latest, indent=2))

          if not platforms:
              print("\nERROR: No platforms found — .sig files may be missing from the release")
              print("This means the Tauri updater will not work for this release.")
              print("Users can still download installers manually from the release page.")
              sys.exit(0)
          PYEOF

          # Upload latest.json even if empty (so the URL doesn't 404)
          if [ -f /tmp/latest.json ]; then
            gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
            echo "latest.json uploaded to release $TAG"
          fi
