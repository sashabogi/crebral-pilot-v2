name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Crebral Pilot ${{ github.ref_name }}" \
            --notes "See the assets below to download and install Crebral Pilot ${{ github.ref_name }}." \
            --latest

  build:
    needs: [create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KC_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_PATH
          security create-keychain -p "actions" $KC_PATH
          security set-keychain-settings -lut 21600 $KC_PATH
          security unlock-keychain -p "actions" $KC_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KC_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "actions" $KC_PATH
          security list-keychain -d user -s $KC_PATH

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Trim leading/trailing whitespace from signing key (defense against secret formatting)
          TAURI_SIGNING_PRIVATE_KEY="$(printf '%s\n' "$TAURI_SIGNING_PRIVATE_KEY" | sed '1s/^[[:space:]]*//' | sed '$s/[[:space:]]*$//')"
          export TAURI_SIGNING_PRIVATE_KEY
          pnpm tauri build ${{ matrix.args }}

      - name: Rename and upload artifacts
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.rust_target }}"

          if [ "${{ runner.os }}" == "Windows" ]; then
            BUNDLE_DIR="src-tauri/target/release/bundle"
          else
            BUNDLE_DIR="src-tauri/target/${TARGET}/release/bundle"
          fi

          echo "=== Bundle directory contents ==="
          find "$BUNDLE_DIR" -type f | head -50

          # tauri build with createUpdaterArtifacts generates .sig files automatically

          # Rename macOS .app.tar.gz with arch suffix to avoid collisions
          if [ -n "$TARGET" ]; then
            case "$TARGET" in
              aarch64-*) ARCH_TAG="aarch64" ;;
              x86_64-*)  ARCH_TAG="x64" ;;
              *)         ARCH_TAG="" ;;
            esac
            if [ -n "$ARCH_TAG" ]; then
              find "$BUNDLE_DIR" -name "*.app.tar.gz" -not -name "*.sig" -type f -print0 2>/dev/null | while IFS= read -r -d '' f; do
                dir=$(dirname "$f")
                base=$(basename "$f" .app.tar.gz)
                newname="${dir}/${base}_${ARCH_TAG}.app.tar.gz"
                echo "Renaming: $(basename "$f") -> $(basename "$newname")"
                mv "$f" "$newname"
                # Also rename the .sig if it exists
                if [ -f "${f}.sig" ]; then
                  mv "${f}.sig" "${newname}.sig"
                fi
              done
            fi
          fi

          echo ""
          echo "=== Final bundle contents ==="
          find "$BUNDLE_DIR" -type f \( -name "*.dmg" -o -name "*.tar.gz*" -o -name "*.exe" -o -name "*.msi*" -o -name "*.nsis*" -o -name "*.sig" \) | sort

          echo ""
          echo "=== Uploading release artifacts ==="

          find "$BUNDLE_DIR" -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" -o \
            -name "*.exe" -o \
            -name "*.msi" -o \
            -name "*.nsis.zip" -o \
            -name "*.nsis.zip.sig" -o \
            -name "*.msi.zip" -o \
            -name "*.msi.zip.sig" \
          \) | while IFS= read -r f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber || echo "FAILED: $(basename "$f")"
          done

  publish-updater:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAG="${{ github.ref_name }}"
          export VERSION="${TAG#v}"
          export REPO="${{ github.repository }}"
          export PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          export BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          echo "Generating latest.json for version $VERSION..."

          export ASSET_LIST=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Release assets:"
          echo "$ASSET_LIST"

          mkdir -p /tmp/sigs

          python3 <<'PYEOF'
          import json, subprocess, os, sys

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          repo = os.environ["REPO"]
          pub_date = os.environ["PUB_DATE"]
          base_url = os.environ["BASE_URL"]

          assets = [a.strip() for a in os.environ.get("ASSET_LIST", "").strip().split("\n") if a.strip()]
          print(f"Found {len(assets)} release assets")
          for a in assets:
              print(f"  - {a}")

          def find_asset(suffix):
              for a in assets:
                  if a.endswith(suffix):
                      return a
              return None

          def read_sig(sig_name):
              if not sig_name or sig_name not in assets:
                  return None
              subprocess.run(
                  ["gh", "release", "download", tag, "--repo", repo,
                   "--pattern", sig_name, "--dir", "/tmp/sigs", "--clobber"],
                  capture_output=True
              )
              path = f"/tmp/sigs/{sig_name}"
              if os.path.isfile(path):
                  return open(path).read().strip()
              return None

          platforms = {}

          # macOS aarch64
          mac_arm_bundle = find_asset("_aarch64.app.tar.gz")
          mac_arm_sig_name = find_asset("_aarch64.app.tar.gz.sig")
          mac_arm_sig = read_sig(mac_arm_sig_name)
          if mac_arm_bundle and mac_arm_sig:
              platforms["darwin-aarch64"] = {
                  "signature": mac_arm_sig,
                  "url": f"{base_url}/{mac_arm_bundle}"
              }
              print("Added darwin-aarch64")
          else:
              print(f"SKIP darwin-aarch64: bundle={mac_arm_bundle}, sig={mac_arm_sig_name}")

          # macOS x64
          mac_x64_bundle = find_asset("_x64.app.tar.gz")
          mac_x64_sig_name = find_asset("_x64.app.tar.gz.sig")
          mac_x64_sig = read_sig(mac_x64_sig_name)
          if mac_x64_bundle and mac_x64_sig:
              platforms["darwin-x86_64"] = {
                  "signature": mac_x64_sig,
                  "url": f"{base_url}/{mac_x64_bundle}"
              }
              print("Added darwin-x86_64")
          else:
              print(f"SKIP darwin-x86_64: bundle={mac_x64_bundle}, sig={mac_x64_sig_name}")

          # Windows x64 — prefer NSIS, fallback to MSI
          for suffix_zip, suffix_sig in [("nsis.zip", "nsis.zip.sig"), ("msi.zip", "msi.zip.sig")]:
              if "windows-x86_64" in platforms:
                  break
              win_bundle = find_asset(suffix_zip)
              win_sig_name = find_asset(suffix_sig)
              win_sig = read_sig(win_sig_name)
              if win_bundle and win_sig:
                  platforms["windows-x86_64"] = {
                      "signature": win_sig,
                      "url": f"{base_url}/{win_bundle}"
                  }
                  fmt = suffix_zip.split(".")[0]
                  print(f"Added windows-x86_64 ({fmt})")
              else:
                  print(f"SKIP windows-x86_64 ({suffix_zip}): bundle={win_bundle}, sig={win_sig_name}")

          latest = {
              "version": version,
              "notes": f"Crebral Pilot v{version}",
              "pub_date": pub_date,
              "platforms": platforms
          }

          with open("/tmp/latest.json", "w") as f:
              json.dump(latest, f, indent=2)

          print("\n=== latest.json ===")
          print(json.dumps(latest, indent=2))

          if not platforms:
              print("\nWARNING: No platforms with signatures found")
              print("Installers are still available for manual download")
          PYEOF

          if [ -f /tmp/latest.json ]; then
            gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
            echo "latest.json uploaded to release $TAG"
          fi
