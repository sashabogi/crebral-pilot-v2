name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Crebral Pilot ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download and install Crebral Pilot ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

      - name: Upload updater artifacts (.sig and .zip bundles)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          echo "Looking for updater artifacts..."

          if [ "${{ runner.os }}" == "Windows" ]; then
            SEARCH_DIR="src-tauri/target/release/bundle"
          else
            TARGET="${{ matrix.rust_target }}"
            if [ -n "$TARGET" ]; then
              SEARCH_DIR="src-tauri/target/${TARGET}/release/bundle"
            else
              SEARCH_DIR="src-tauri/target/release/bundle"
            fi
          fi

          echo "Searching in: $SEARCH_DIR"

          # Upload .sig files
          find "$SEARCH_DIR" -name "*.sig" -type f 2>/dev/null | while read f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber || true
          done

          # Upload updater zip bundles (Windows: .nsis.zip, .msi.zip; macOS: .app.tar.gz already uploaded by tauri-action)
          find "$SEARCH_DIR" \( -name "*.nsis.zip" -o -name "*.msi.zip" \) -type f 2>/dev/null | while read f; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --repo "${{ github.repository }}" --clobber || true
          done

  publish-updater:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            src-tauri/tauri.conf.json

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          echo "Generating latest.json for version $VERSION..."
          sleep 10

          # List all release assets
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')
          echo "Release assets:"
          echo "$ASSETS"

          mkdir -p /tmp/sigs

          # Helper: download .sig file, return JSON-safe escaped content
          get_sig() {
            local sig_name="$1"
            if echo "$ASSETS" | grep -qF "$sig_name"; then
              gh release download "$TAG" --repo "$REPO" --pattern "$sig_name" --dir /tmp/sigs --clobber 2>/dev/null
              if [ -f "/tmp/sigs/$sig_name" ]; then
                # minisign sigs are multiline — escape for JSON embedding
                python3 -c "import sys,json; print(json.dumps(open(sys.argv[1]).read()))" "/tmp/sigs/$sig_name"
                return 0
              fi
            fi
            return 1
          }

          # Use python3 to build latest.json safely (handles multiline sigs, special chars)
          python3 <<'PYEOF'
          import json, subprocess, os, sys

          tag = os.environ["TAG"]
          version = os.environ["VERSION"]
          repo = os.environ["REPO"]
          pub_date = os.environ["PUB_DATE"]
          base_url = os.environ["BASE_URL"]

          assets_raw = os.environ.get("ASSETS_LIST", "")
          if not assets_raw:
              result = subprocess.run(
                  ["gh", "release", "view", tag, "--repo", repo, "--json", "assets", "--jq", ".assets[].name"],
                  capture_output=True, text=True
              )
              assets_raw = result.stdout
          assets = [a.strip() for a in assets_raw.strip().split("\n") if a.strip()]

          def find_asset(suffix):
              for a in assets:
                  if a.endswith(suffix):
                      return a
              return None

          def read_sig(sig_name):
              if not sig_name or sig_name not in assets:
                  return None
              subprocess.run(
                  ["gh", "release", "download", tag, "--repo", repo,
                   "--pattern", sig_name, "--dir", "/tmp/sigs", "--clobber"],
                  capture_output=True
              )
              path = f"/tmp/sigs/{sig_name}"
              if os.path.isfile(path):
                  return open(path).read().strip()
              return None

          platforms = {}

          # macOS aarch64
          mac_arm_bundle = find_asset("_aarch64.app.tar.gz")
          mac_arm_sig_name = find_asset("_aarch64.app.tar.gz.sig")
          mac_arm_sig = read_sig(mac_arm_sig_name)
          if mac_arm_bundle and mac_arm_sig:
              platforms["darwin-aarch64"] = {
                  "signature": mac_arm_sig,
                  "url": f"{base_url}/{mac_arm_bundle}"
              }
              print("Added darwin-aarch64")

          # macOS x64
          mac_x64_bundle = find_asset("_x64.app.tar.gz")
          mac_x64_sig_name = find_asset("_x64.app.tar.gz.sig")
          mac_x64_sig = read_sig(mac_x64_sig_name)
          if mac_x64_bundle and mac_x64_sig:
              platforms["darwin-x86_64"] = {
                  "signature": mac_x64_sig,
                  "url": f"{base_url}/{mac_x64_bundle}"
              }
              print("Added darwin-x86_64")

          # Windows x64 — prefer NSIS, fallback to MSI
          for suffix_zip, suffix_sig in [("nsis.zip", "nsis.zip.sig"), ("msi.zip", "msi.zip.sig")]:
              if "windows-x86_64" in platforms:
                  break
              win_bundle = find_asset(suffix_zip)
              win_sig_name = find_asset(suffix_sig)
              win_sig = read_sig(win_sig_name)
              if win_bundle and win_sig:
                  platforms["windows-x86_64"] = {
                      "signature": win_sig,
                      "url": f"{base_url}/{win_bundle}"
                  }
                  fmt = suffix_zip.split(".")[0]
                  print(f"Added windows-x86_64 ({fmt})")

          latest = {
              "version": version,
              "notes": f"Crebral Pilot v{version}",
              "pub_date": pub_date,
              "platforms": platforms
          }

          with open("/tmp/latest.json", "w") as f:
              json.dump(latest, f, indent=2)

          print(json.dumps(latest, indent=2))

          if not platforms:
              print("WARNING: No platforms found — .sig files may be missing from the release")
              sys.exit(1)
          PYEOF

          # Upload to release
          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "latest.json uploaded to release $TAG"
